api:
  host: 0.0.0.0
  model_path: models/exported/model_torchscript.pt
  port: 8000
augmentation:
  color_jitter_brightness: 0.2
  color_jitter_contrast: 0.2
  color_jitter_saturation: 0.2
  horizontal_flip_prob: 0.5
  random_resized_crop_scale:
  - 0.8
  - 1.0
  rotation_degrees: 10
data:
  image_size: 224
  num_classes: 196
  processed_dir: data/processed
  raw_dir: data/raw
  test_split: 0.15
  train_split: 0.7
  val_split: 0.15
model:
  dropout: 0.2
  name: efficientnet-b0
  pretrained: true
paths:
  checkpoint_dir: models/checkpoints
  export_dir: models/exported
  logs_dir: logs
training:
  batch_size: 32
  device: auto
  early_stopping_patience: 7
  epochs: 30
  learning_rate: 0.001
  num_workers: 0
  weight_decay: 0.0001
